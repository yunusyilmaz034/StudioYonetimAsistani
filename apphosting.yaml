# Firebase App Hosting — the deploy target for the Next.js app (owner decision, 2026-07-13).
#
# Two things this file is careful about:
#
#   • A SECRET is never a `value`. `secret:` names an entry in Google Secret Manager and is
#     injected at RUNTIME only; it never enters the build, never reaches the browser bundle, and
#     never appears in this repository. A key committed to git is a key that has leaked, and the
#     only honest response to a leaked key is to rotate it — which is why `secrets.ts` refuses to
#     start without one rather than falling back to a value we published (DEBT-013).
#
#   • Anything prefixed `NEXT_PUBLIC_` IS PUBLIC. It is compiled into the browser bundle. Nothing
#     may be put there that we would mind a member reading — the Firebase web config is an
#     identifier, not a credential, and that is why it is allowed to be here.
#
# App Hosting builds from git; there is no `firebase deploy --only hosting`. The backend's
# root directory (this repo root) and its branch are configured once, on the backend itself.

runConfig:
  # A single studio, 07:00–22:00 TRT. `minInstances: 0` means a cold start on the first request of
  # the morning; `maxInstances` is a cost ceiling, not a capacity plan. Revisit when there is a
  # second studio — not before, and not on a guess.
  minInstances: 0
  maxInstances: 2
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  # ── Public: compiled into the browser bundle, on purpose ──────────────────────────────────
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: studio-yonetim-prod
    availability:
      - BUILD
      - RUNTIME

  # The Firebase web config (hotfix B-1). An `apiKey` here is an IDENTIFIER, not a credential: it
  # names the project at Google's front door, and what protects the data is Auth + the security rules.
  # Without these two the client SDK cannot sign anybody in — which is what production would have done
  # on the first morning of the pilot, because they used to be hardcoded to the emulator's demo values.
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyBYCZEFu-oxit5J9h_pgNnEfCyYyud1b0s
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: studio-yonetim-prod.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME

  # ── Server-side, not secret ───────────────────────────────────────────────────────────────
  - variable: FIREBASE_PROJECT_ID
    value: studio-yonetim-prod
    availability:
      - RUNTIME

  # The sender the studio's members will see. Not a secret — but it IS the identity the domain's
  # SPF/DKIM records must authorise, so it lives beside the key rather than in a source file.
  - variable: EMAIL_FROM
    value: noreply@pilatesfitnessbyisil.com
    availability:
      - RUNTIME

  # ── Secrets: Secret Manager, runtime only, never in this file ─────────────────────────────
  # Provision with:  firebase apphosting:secrets:set qr-token-secret --project <prod>
  - variable: QR_TOKEN_SECRET
    secret: qr-token-secret
    availability:
      - RUNTIME

  # Set ONLY during a key rotation, and removed once the sixty-second TTL has passed. While it is
  # present, tokens minted under the outgoing key still verify — so a rotation costs no failed
  # scans at the door (DEBT-013, `secrets.ts`).
  # - variable: QR_TOKEN_SECRET_PREVIOUS
  #   secret: qr-token-secret-previous
  #   availability:
  #     - RUNTIME

  - variable: RESEND_API_KEY
    secret: resend-api-key
    availability:
      - RUNTIME
